<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSTKCC 中史科互動學習天地</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #fdfbf7;
            --ink-black: #1a1a1a;
            --heritage-red: #8c1b1b;
            --heritage-blue: #1a3a5a;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--paper-bg);
            color: var(--ink-black);
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
        }
        h1, h2, .serif { font-family: 'Noto Serif TC', serif; }

        /* 分類按鈕樣式 */
        .filter-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e2e2;
        }
        .filter-btn.active {
            background-color: var(--heritage-red);
            color: white;
            border-color: var(--heritage-red);
            box-shadow: 0 4px 12px rgba(140, 27, 27, 0.2);
            transform: translateY(-2px);
        }

        /* 無圖片版的學習卡片 */
        .learning-card {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: white;
            border: 1px solid #eee;
            height: 100%;
        }
        .learning-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-color: var(--heritage-red);
        }

        /* 年級標籤顏色映射 */
        .tag-s1 { background-color: #4a7c59; } 
        .tag-s2 { background-color: #3d5a80; } 
        .tag-s3 { background-color: #7d5a50; } 
        .tag-s4 { background-color: #b07d62; } 
        .tag-s5 { background-color: #582f0e; } 
        .tag-s6 { background-color: var(--heritage-red); } 

        /* 優雅的自訂捲軸 (給長文字使用) */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 載入動畫 */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-card { animation: fadeInScale 0.4s ease forwards; }
    </style>
</head>
<body class="min-h-screen">

    <header class="pt-16 pb-12 px-6 text-center">
        <div class="mb-4">
            <span class="serif text-xl md:text-2xl tracking-[0.3em] text-gray-500">樂善堂梁銶琚書院</span>
        </div>
        <h1 class="serif text-4xl md:text-6xl font-black text-slate-800 mb-4">
            中國歷史科<span class="text-[var(--heritage-red)]">互動學習天地</span>
        </h1>
        <div class="w-24 h-1 bg-[var(--heritage-red)] mx-auto mb-8"></div>
    </header>

    <div class="max-w-6xl mx-auto px-6 mb-12">
        <div class="flex flex-col md:flex-row items-center justify-between gap-6">
            <div id="filterGroup" class="flex flex-wrap justify-center gap-2">
                <button class="filter-btn active px-6 py-2 rounded-full text-sm font-medium" data-grade="all">全部</button>
                <button class="filter-btn px-6 py-2 rounded-full text-sm font-medium" data-grade="中一">中一</button>
                <button class="filter-btn px-6 py-2 rounded-full text-sm font-medium" data-grade="中二">中二</button>
                <button class="filter-btn px-6 py-2 rounded-full text-sm font-medium" data-grade="中三">中三</button>
                <button class="filter-btn px-6 py-2 rounded-full text-sm font-medium" data-grade="中四">中四</button>
                <button class="filter-btn px-6 py-2 rounded-full text-sm font-medium" data-grade="中五">中五</button>
                <button class="filter-btn px-6 py-2 rounded-full text-sm font-medium" data-grade="中六">中六</button>
            </div>
            
            <div class="relative w-full md:w-64">
                <input type="text" id="searchInput" placeholder="搜尋課題名稱..." 
                    class="w-full bg-white border border-gray-200 rounded-xl py-3 px-10 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--heritage-red)] transition-all">
                <svg class="absolute left-3 top-3.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="cardContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400">正在打開歷史卷軸...</div>
        </div>
    </main>

    <script>
        const CSV_URL = './data.csv'; 
        let allData = [];
        let currentFilter = 'all';

        // 取得年級對應顏色 class
        function getTagClass(grade) {
            if (grade.includes('中一')) return 'tag-s1';
            if (grade.includes('中二')) return 'tag-s2';
            if (grade.includes('中三')) return 'tag-s3';
            if (grade.includes('中四')) return 'tag-s4';
            if (grade.includes('中五')) return 'tag-s5';
            if (grade.includes('中六')) return 'tag-s6';
            return 'bg-gray-500';
        }

        function parseCSV(data) {
            const rows = []; let currRow = []; let currVal = ''; let inQuotes = false;
            for (let i = 0; i < data.length; i++) {
                const char = data[i]; const nextChar = data[i+1];
                if (char === '"' && inQuotes && nextChar === '"') { currVal += '"'; i++; } 
                else if (char === '"') { inQuotes = !inQuotes; } 
                else if (char === ',' && !inQuotes) { currRow.push(currVal.trim()); currVal = ''; } 
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currVal !== '' || currRow.length > 0) {
                        currRow.push(currVal.trim()); rows.push(currRow); currRow = []; currVal = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++; 
                } else { currVal += char; }
            }
            if (currRow.length > 0 || currVal !== '') { currRow.push(currVal.trim()); rows.push(currRow); }
            return rows;
        }

        function renderCards(filterGrade = 'all', searchTerm = '') {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            const filtered = allData.filter(row => {
                const matchGrade = filterGrade === 'all' || row[0] === filterGrade;
                const matchSearch = row[1].toLowerCase().includes(searchTerm.toLowerCase());
                return matchGrade && matchSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="text-5xl mb-4">📜</div>
                        <p class="text-gray-400 serif text-xl">${filterGrade === 'all' ? '目前尚無資料' : filterGrade + ' 的歷史卷軸正在努力編纂中，敬請期待！'}</p>
                    </div>`;
                return;
            }

            filtered.forEach((row, index) => {
                const [category, title, url, desc] = row;
                
                const card = document.createElement('div');
                card.className = 'learning-card group rounded-2xl flex flex-col animate-card';
                card.style.animationDelay = `${index * 50}ms`;

                // 取消圖片，將排版改為純文字導向
                card.innerHTML = `
                    <div class="p-6 flex-grow flex flex-col h-full">
                        <div class="mb-3">
                            <span class="${getTagClass(category)} text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm inline-block">
                                ${category}
                            </span>
                        </div>
                        <h3 class="serif text-xl font-bold mb-3 text-slate-800 group-hover:text-[var(--heritage-red)] transition-colors">
                            ${title}
                        </h3>
                        
                        <div class="text-gray-600 text-sm leading-relaxed mb-6 flex-grow overflow-y-auto max-h-32 pr-2 custom-scrollbar">
                            ${desc || '點擊下方按鈕開始探索此課題內容。'}
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-gray-100">
                            <a href="${url}" target="_blank" 
                               class="block w-full text-center py-3 rounded-xl bg-slate-50 text-slate-700 text-sm font-bold border border-slate-200 hover:bg-[var(--heritage-red)] hover:text-white hover:border-[var(--heritage-red)] transition-all">
                               開始互動學習
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 初始化
        async function init() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('找不到 data.csv');
                const text = await response.text();
                const rawData = parseCSV(text);
                allData = rawData.slice(1); // 移除標題列
                renderCards();
            } catch (err) {
                document.getElementById('cardContainer').innerHTML = `<p class="col-span-full text-center text-red-500">${err.message}</p>`;
            }
        }

        // 搜尋監聽
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCards(currentFilter, e.target.value);
        });

        // 過濾按鈕監聽
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-grade');
                renderCards(currentFilter, document.getElementById('searchInput').value);
            });
        });

        init();
    </script>
</body>
</html>
