name: 自動更新中史科資料庫

on:
  schedule:
    # 每 2 小時自動抓取一次
    - cron: '0 */2 * * *' 
  workflow_dispatch: 
    # 讓你可以手動點擊按鈕立即更新

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: 取得最新的網頁代碼
        uses: actions/checkout@v3

      - name: 從 Google 試算表下載最新 CSV
        run: curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQY2D_L630Rxdm_z7qqfuN_JDP_ig1IQYdZ9NtybDhb9HDpD2KRJdCCwCv2LU080tpTO2ptWpugUOe/pub?output=csv" -o data.csv

      - name: 將新資料上傳到 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新互動學習卡片資料" && git push)
