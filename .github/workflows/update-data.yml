name: 自動更新中史科資料庫

on:
  schedule:
    # 每 2 小時自動執行一次 (可隨意調整)
    - cron: '0 */2 * * *' 
  workflow_dispatch: 
    # 加入這個設定，讓你可以隨時手動點擊按鈕強制更新

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: 取得最新的網頁代碼
        uses: actions/checkout@v3

      - name: 從 Google 試算表下載最新 CSV
        # 這裡使用的是你之前提供的真實 Google 試算表連結
        run: curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQY2D_L630Rxdm_z7qqfuN_JDP_ig1IQYdZ9NtybDhb9HDpD2KRJdCCwCv2LU080tpTO2ptWpugUOe/pub?output=csv" -o data.csv

      - name: 將新資料上傳到 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.csv
          # 如果資料有變動，就自動 Commit 並 Push；如果沒變動就略過
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新互動學習卡片資料" && git push)
